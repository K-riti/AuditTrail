version: '3.8'

services:
  audittrail-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: audittrail-api
    ports:
      - "5000:80"
      - "5001:443"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=AuditTrailDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True
      - Jwt__SecretKey=AuditTrailSuperSecretKey_MustBeAtLeast32Characters!
      - Jwt__Issuer=AuditTrail
      - Jwt__Audience=AuditTrailAPI
      - Jwt__ExpirationMinutes=60
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - audittrail-network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: audittrail-sqlserver
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Developer
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong@Passw0rd" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - audittrail-network

networks:
  audittrail-network:
    driver: bridge

volumes:
  sqlserver-data:
